specVersion: 0.0.8
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: GoldVault
    network: arbitrum-sepolia
    source:
      address: "0x2a0c1229d20f24eA53dB253E7925ebF43bcb6Cd9"
      abi: GoldVault
      startBlock: 26913249
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
        - VaultWithdraw
      abis:
        - name: GoldVault
          file: GoldVault\GoldVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
      file: GoldVault\GoldVault.wasm
  - kind: ethereum
    name: GovernanceToken
    network: arbitrum-sepolia
    source:
      address: "0xd2e1c943fBf919f0B123C1e8A2cBb1500c9c1538"
      abi: GovernanceToken
      startBlock: 26913249
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Delegate
      abis:
        - name: GovernanceToken
          file: GovernanceToken\GovernanceToken.json
      eventHandlers:
        - event: DelegateChanged(indexed address,indexed address,indexed address)
          handler: handleDelegateChanged
      file: GoldVault\GoldVault.wasm
  - kind: ethereum
    name: GoldGovernor
    network: arbitrum-sepolia
    source:
      address: "0x823792C4D55a68006AfaAc477C5DCD470e2Ca6D2"
      abi: GoldGovernor
      startBlock: 26913249
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: GoldGovernor
          file: GoldGovernor\GoldGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
      file: GoldVault\GoldVault.wasm
