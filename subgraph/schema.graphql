type VaultDeposit @entity(immutable: true) {
  id: ID!
  sender: Bytes!
  owner: Bytes!
  assets: BigInt!
  shares: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type VaultWithdraw @entity(immutable: true) {
  id: ID!
  sender: Bytes!
  receiver: Bytes!
  owner: Bytes!
  assets: BigInt!
  shares: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type Delegate @entity(immutable: true) {
  id: ID!
  delegator: Bytes!
  fromDelegate: Bytes!
  toDelegate: Bytes!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type Proposal @entity(immutable: true) {
  id: ID!
  proposalId: BigInt!
  proposer: Bytes!
  description: String!
  startBlock: BigInt!
  endBlock: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type Vote @entity(immutable: true) {
  id: ID!
  proposalId: BigInt!
  voter: Bytes!
  support: Int!
  weight: BigInt!
  reason: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}