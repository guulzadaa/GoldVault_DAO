name: CI
on:
  workflow_dispatch:
# on:
#   push:
#     branches: [main, gulzada]
#   pull_request:
#     branches: [main]

jobs:
  foundry:
    name: Foundry Tests and Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: |
          mkdir -p lib
          if [ ! -d "lib/forge-std/src" ]; then
            git clone https://github.com/foundry-rs/forge-std lib/forge-std
          fi
          if [ ! -d "lib/openzeppelin-contracts/contracts" ]; then
            git clone https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts
          fi
          if [ ! -d "lib/openzeppelin-contracts-upgradeable/contracts" ]; then
            git clone https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable lib/openzeppelin-contracts-upgradeable
          fi


      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Forge fmt check
        run: forge fmt --check

      - name: Build contracts
        run: forge build

      - name: Run tests
        run: forge test -vv
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Run coverage
        run: forge coverage
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Run Slither
        run: slither . --filter-paths "lib|test|src/security-case-studies" || true