name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  foundry:
    name: Foundry Tests and Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Forge fmt check
        run: forge fmt --check

      - name: Build contracts
        run: forge build

      - name: Run unit, fuzz, and invariant tests
        run: forge test -vv
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Run coverage
        run: forge coverage

      - name: Run Slither
        run: slither . --filter-paths "lib|test|src/security-case-studies"